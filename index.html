<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PharmaEngine</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap');

.assay-root {
  --paper: #FAFAF7;
  --ink: #1B1F1D;
  --ink-soft: rgba(27,31,29,0.62);
  --ink-faint: rgba(27,31,29,0.38);
  --bench: #EFEDE4;
  --hairline: #D8D4C8;
  --reagent: #1E5AA8;
  --reagent-soft: rgba(30,90,168,0.10);
  --assay-green: #2F7A4F;
  --assay-green-soft: rgba(47,122,79,0.10);
  --flag-amber: #B5790F;
  --flag-amber-soft: rgba(181,121,15,0.12);
  --error: #B23B3B;

  background: var(--paper);
  color: var(--ink);
  font-family: 'IBM Plex Sans', sans-serif;
  min-height: 100vh;
  padding: 28px 16px 60px;
  display: flex;
  justify-content: center;
}

.assay-root * { box-sizing: border-box; }

.assay-container {
  width: 100%;
  max-width: 680px;
}

.assay-header { margin-bottom: 22px; }

.assay-wordmark {
  font-family: 'IBM Plex Mono', monospace;
  font-weight: 600;
  font-size: 13px;
  letter-spacing: 0.18em;
  color: var(--reagent);
  text-transform: uppercase;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

.assay-wordmark .dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--assay-green);
  display: inline-block;
}

.assay-title {
  font-size: 26px;
  font-weight: 700;
  margin: 8px 0 4px;
  letter-spacing: -0.01em;
}

.assay-subtitle {
  font-size: 13.5px;
  color: var(--ink-soft);
  line-height: 1.5;
  max-width: 480px;
}

.assay-panel {
  background: var(--bench);
  border: 1px solid var(--hairline);
  border-radius: 10px;
  padding: 18px;
  margin-bottom: 24px;
}

.assay-field { margin-bottom: 14px; }
.assay-field:last-of-type { margin-bottom: 0; }

.assay-label {
  display: block;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10.5px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--reagent);
  margin-bottom: 6px;
}

.assay-input, .assay-textarea {
  width: 100%;
  background: var(--paper);
  border: 1px solid var(--hairline);
  border-radius: 6px;
  padding: 10px 12px;
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 14.5px;
  color: var(--ink);
  outline: none;
  transition: border-color 0.15s ease;
}

.assay-input::placeholder, .assay-textarea::placeholder { color: var(--ink-faint); }

.assay-input:focus, .assay-textarea:focus {
  border-color: var(--reagent);
  box-shadow: 0 0 0 3px var(--reagent-soft);
}

.assay-pills {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.assay-pill {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11.5px;
  letter-spacing: 0.04em;
  padding: 6px 11px;
  border-radius: 5px;
  border: 1px solid var(--hairline);
  background: var(--paper);
  color: var(--ink-soft);
  cursor: pointer;
  transition: all 0.12s ease;
}

.assay-pill:hover { border-color: var(--reagent); color: var(--ink); }

.assay-pill.active {
  background: var(--reagent);
  border-color: var(--reagent);
  color: var(--paper);
}

.assay-row { display: flex; gap: 14px; align-items: flex-start; margin-top: 16px; flex-wrap: wrap; }

.assay-button {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12.5px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  background: var(--ink);
  color: var(--paper);
  border: none;
  border-radius: 6px;
  padding: 11px 20px;
  cursor: pointer;
  transition: opacity 0.15s ease, transform 0.1s ease;
}

.assay-button:hover { opacity: 0.85; }
.assay-button:active { transform: translateY(1px); }
.assay-button:disabled { opacity: 0.45; cursor: not-allowed; }

.assay-button.secondary {
  background: transparent;
  color: var(--ink-soft);
  border: 1px solid var(--hairline);
}
.assay-button.secondary:hover { border-color: var(--ink-faint); color: var(--ink); opacity: 1; }

.assay-status {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12.5px;
  color: var(--ink-soft);
  margin-bottom: 18px;
  min-height: 18px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.assay-status .cursor {
  display: inline-block;
  width: 7px; height: 14px;
  background: var(--reagent);
  animation: assayBlink 1s steps(1) infinite;
}

@keyframes assayBlink { 50% { opacity: 0; } }

.assay-error {
  font-size: 13.5px;
  color: var(--error);
  background: rgba(178,59,59,0.07);
  border: 1px solid rgba(178,59,59,0.25);
  border-radius: 8px;
  padding: 12px 14px;
  margin-bottom: 18px;
  line-height: 1.5;
}

.assay-empty {
  font-size: 13.5px;
  color: var(--ink-faint);
  border: 1px dashed var(--hairline);
  border-radius: 10px;
  padding: 28px 18px;
  text-align: center;
  line-height: 1.6;
}

.assay-direct-response {
  background: linear-gradient(to bottom right, #ffffff, var(--bench));
  border: 1px solid var(--hairline);
  border-left: 4px solid var(--reagent);
  border-radius: 8px;
  padding: 16px;
  margin-bottom: 24px;
  font-size: 14.5px;
  line-height: 1.6;
  color: var(--ink);
}

.assay-direct-title {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  color: var(--reagent);
  letter-spacing: 0.08em;
  margin-bottom: 8px;
}

.assay-direct-text {
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;  
  overflow: hidden;
  transition: max-height 0.25s ease-out;
}

.assay-direct-text.expanded {
  display: block;
  overflow: visible;
}

.assay-toggle-btn {
  background: none;
  border: none;
  color: var(--reagent);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11.5px;
  font-weight: 600;
  cursor: pointer;
  padding: 0;
  margin-top: 8px;
  text-decoration: underline;
  display: block;
}

.assay-resultsbar {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 10px;
}

.assay-resultscount {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11.5px;
  color: var(--ink-faint);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

.assay-copy {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11.5px;
  color: var(--reagent);
  background: none;
  border: none;
  cursor: pointer;
  text-decoration: underline;
  text-underline-offset: 2px;
  padding: 0;
}

.assay-entry {
  display: flex;
  gap: 12px;
  border-bottom: 1px solid var(--hairline);
  padding: 14px 2px;
}

.assay-entry:last-child { border-bottom: none; }

.assay-rail {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
  width: 30px;
  padding-top: 1px;
}

.assay-accession {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: var(--ink-faint);
}

.assay-tab {
  width: 4px;
  flex: 1;
  min-height: 24px;
  border-radius: 2px;
}

.assay-body { flex: 1; min-width: 0; }

.assay-entry-title {
  font-size: 14.5px;
  font-weight: 600;
  color: var(--ink);
  text-decoration: none;
  line-height: 1.4;
}

.assay-entry-title:hover { text-decoration: underline; }

.assay-entry-relevance {
  font-size: 13px;
  color: var(--ink-soft);
  line-height: 1.5;
  margin: 5px 0 7px;
}

.assay-entry-meta {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10.5px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

.assay-tag {
  display: inline-block;
  padding: 2px 7px;
  border-radius: 4px;
  margin-right: 7px;
}

.assay-tag.type-tag {
  background: var(--bench);
  color: var(--ink-soft);
  border: 1px solid var(--hairline);
}

.assay-footnote {
  font-size: 11.5px;
  color: var(--ink-faint);
  margin-top: 20px;
  line-height: 1.5;
}

@media (max-width: 480px) {
  .assay-title { font-size: 22px; }
  .assay-row { flex-direction: column; align-items: stretch; }
  .assay-row .assay-button { width: 100%; text-align: center; }
}
</style>
</head>
<body>
<div class="assay-root" id="assayRoot">
  <div class="assay-container">

    <div class="assay-header">
      <span class="assay-wordmark"><span class="dot"></span>By Mezir</span>
      <div class="assay-title">PharmaEngine</div>
      <div class="assay-subtitle">Enter a compound, gene, or pathway and what you're trying to find out. It searches PubMed, Scholar, and relevant specialty databases for studies that actually match.</div>
    </div>

    <div class="assay-panel">
      <div class="assay-field">
        <label class="assay-label">Target</label>
        <input class="assay-input" id="assayTarget" type="text" placeholder="e.g. KY19382, BRCA1, mTOR pathway" />
      </div>
      <div class="assay-field">
        <label class="assay-label">Goal / context</label>
        <textarea class="assay-textarea" id="assayGoal" rows="2" placeholder="e.g. anti-inflammatory activity, role in tumor suppression, drug interactions"></textarea>
      </div>
      <div class="assay-field">
        <label class="assay-label">Type</label>
        <div class="assay-pills" id="assayPills">
          <button class="assay-pill active" data-type="auto">Auto-detect</button>
          <button class="assay-pill" data-type="compound">Compound</button>
          <button class="assay-pill" data-type="gene">Gene</button>
          <button class="assay-pill" data-type="pathway">Pathway</button>
        </div>
      </div>
      <div class="assay-row">
        <button class="assay-button" id="assayRun">Run assay</button>
        <button class="assay-button secondary" id="assayClear">Clear</button>
      </div>
    </div>

    <div id="assayStatus"></div>
    <div id="assayOutput">
      <div class="assay-empty">No samples queried yet. Enter a target above to pull literature.</div>
    </div>

  </div>
</div>

<script>
(function() {
  const root = document.getElementById('assayRoot');
  if (!root) { console.error('Assay: root container not found.'); return; }
  const targetInput = root.querySelector('#assayTarget');
  const goalInput = root.querySelector('#assayGoal');
  const pills = root.querySelectorAll('.assay-pill');
  const runBtn = root.querySelector('#assayRun');
  const clearBtn = root.querySelector('#assayClear');
  const statusEl = root.querySelector('#assayStatus');
  const outputEl = root.querySelector('#assayOutput');

  let selectedType = 'auto';
  let isCooldown = false;
  let tickerInterval = null;

  pills.forEach(p => {
    p.addEventListener('click', () => {
      pills.forEach(x => x.classList.remove('active'));
      p.classList.add('active');
      selectedType = p.dataset.type;
    });
  });

  clearBtn.addEventListener('click', () => {
    targetInput.value = '';
    goalInput.value = '';
    statusEl.innerHTML = '';
    outputEl.innerHTML = '<div class="assay-empty">No samples queried yet. Enter a target above to pull literature.</div>';
  });

  [targetInput, goalInput].forEach(el => {
    el.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { 
        e.preventDefault(); 
        if (!isCooldown) run(); 
      }
    });
  });

  runBtn.addEventListener('click', run);

  const tickerPhrases = [
    'optimizing search parameter matrices', 'querying pubmed systems', 'cross-referencing structural records', 'analyzing abstracts with 120b logic', 'scoring lateral path linkages'
  ];

  function startTicker() {
    let i = 0;
    statusEl.innerHTML = `<div class="assay-status">&gt; ${tickerPhrases[0]}<span class="cursor"></span></div>`;
    const line = statusEl.querySelector('.assay-status');
    tickerInterval = setInterval(() => {
      i = (i + 1) % tickerPhrases.length;
      line.innerHTML = `&gt; ${tickerPhrases[i]}<span class="cursor"></span>`;
    }, 1400);
  }

  function stopTicker() {
    if (tickerInterval) clearInterval(tickerInterval);
    tickerInterval = null;
    statusEl.innerHTML = '';
  }

  function sourceStyle(source) {
    const s = (source || '').toLowerCase();
    if (s.includes('pubmed') || s.includes('medrxiv') || s.includes('biorxiv')) {
      return { tab: 'var(--reagent)', bg: 'var(--reagent-soft)', fg: 'var(--reagent)' };
    }
    if (s.includes('scholar')) {
      return { tab: 'var(--assay-green)', bg: 'var(--assay-green-soft)', fg: 'var(--assay-green)' };
    }
    return { tab: 'var(--flag-amber)', bg: 'var(--flag-amber-soft)', fg: 'var(--flag-amber)' };
  }

  function escapeHtml(str) {
    const d = document.createElement('div');
    d.textContent = str == null ? '' : String(str);
    return d.innerHTML;
  }

  function renderPayload(directResponse, results, isFallback) {
    let html = '';
    
    if (directResponse) {
      html += `
        <div class="assay-direct-response">
          <div class="assay-direct-title">Synthesis & Analytical Cross-Linking</div>
          <div class="assay-direct-text" id="assayDirectText">${escapeHtml(directResponse)}</div>
          <button class="assay-toggle-btn" id="assayToggleBtn">Read More</button>
        </div>
      `;
    }

    if (!results || !results.length) {
      html += '<div class="assay-empty">No literature listings found. Review conceptual analysis box above for structural insights.</div>';
      outputEl.innerHTML = html;
      initToggleListener();
      return;
    }

    const resultsTitleText = isFallback ? 'Foundational / Partially Related Studies' : 'Relevant Matches Found';

    html += `
      <div class="assay-resultsbar">
        <span class="assay-resultscount" style="${isFallback ? 'color: var(--flag-amber)' : ''}">${results.length} ${resultsTitleText}</span>
        <button class="assay-copy" id="assayCopyLinks">Copy all links</button>
      </div>
      <div class="assay-list">`;

    results.forEach((r, idx) => {
      const style = sourceStyle(r.source);
      const num = String(idx + 1).padStart(3, '0');
      const studyTypeTag = r.studyType ? `<span class="assay-tag type-tag">${escapeHtml(r.studyType)}</span>` : '';
      
      html += `
        <div class="assay-entry">
          <div class="assay-rail">
            <span class="assay-accession">${num}</span>
            <span class="assay-tab" style="background:${style.tab}"></span>
          </div>
          <div class="assay-body">
            <a class="assay-entry-title" href="${escapeHtml(r.url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(r.title)}</a>
            <div class="assay-entry-relevance">${escapeHtml(r.relevance)}</div>
            <div class="assay-entry-meta">
              <span class="assay-tag" style="background:${style.bg}; color:${style.fg}">${escapeHtml(r.source || 'source')}</span>${studyTypeTag}${r.year ? escapeHtml(r.year) : ''}
            </div>
          </div>
        </div>`;
    });

    html += '</div><div class="assay-footnote">Links open in a new tab. Always review structural documentation before proceeding.</div>';
    outputEl.innerHTML = html;

    initToggleListener();

    const copyBtn = root.querySelector('#assayCopyLinks');
    if (copyBtn) {
      copyBtn.addEventListener('click', () => {
        const text = results.map(r => r.url).join('\n');
        navigator.clipboard.writeText(text).then(() => {
          const original = copyBtn.textContent;
          copyBtn.textContent = 'Copied';
          setTimeout(() => { copyBtn.textContent = original; }, 1500);
        });
      });
    }
  }

  function initToggleListener() {
    const toggleBtn = root.querySelector('#assayToggleBtn');
    const textEl = root.querySelector('#assayDirectText');
    if (toggleBtn && textEl) {
      toggleBtn.addEventListener('click', () => {
        const isExpanded = textEl.classList.toggle('expanded');
        toggleBtn.textContent = isExpanded ? 'Read Less' : 'Read More';
      });
    }
  }

  function showError(message) {
    outputEl.innerHTML = `<div class="assay-error">${escapeHtml(message)}</div>`;
  }

  function handleCooldown(secondsLeft) {
    isCooldown = true;
    runBtn.disabled = true;
    runBtn.textContent = `Hold (${secondsLeft}s)`;
    
    const interval = setInterval(() => {
      secondsLeft--;
      if (secondsLeft <= 0) {
        clearInterval(interval);
        isCooldown = false;
        runBtn.disabled = false;
        runBtn.textContent = 'Run assay';
      } else {
        runBtn.textContent = `Hold (${secondsLeft}s)`;
      }
    }, 1000);
  }

  async function run() {
    if (isCooldown) return;
    
    const target = targetInput.value.trim();
    const goal = goalInput.value.trim();
    if (!target) {
      targetInput.focus();
      targetInput.style.borderColor = 'var(--error)';
      setTimeout(() => { targetInput.style.borderColor = ''; }, 1200);
      return;
    }

    outputEl.innerHTML = '';
    startTicker();
    runBtn.disabled = true;

    const typeLabel = selectedType === 'auto' ? 'unspecified' : selectedType;
    let callSucceeded = false;

    try {
      const response = await fetch('/api/assay', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ target, goal, typeLabel })
      });

      if (!response.ok) throw new Error(`Server request failed (${response.status})`);

      const parsed = await response.json();
      const results = Array.isArray(parsed.results) ? parsed.results : [];
      
      renderPayload(parsed.directResponse, results.filter(r => r && r.title && r.url), parsed.isFallback || false);
      callSucceeded = true;

    } catch (err) {
      showError('Something went wrong running the search: ' + err.message + '. Try again in a moment.');
      callSucceeded = false;
    } finally {
      stopTicker();
      handleCooldown(callSucceeded ? 10 : 5);
    }
  }
})();
</script>
</body>
</html>
